services:
  - type: web
    name: quickbite-backend
    env: docker
    dockerfilePath: ./FRONTEND/BACKEND/Dockerfile
    dockerContext: ./FRONTEND/BACKEND
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8080
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
