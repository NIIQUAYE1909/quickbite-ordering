# =============================================
# QuickBite - Render Deployment Configuration
# =============================================
# This file defines the services for deploying on Render.com
# 
# To deploy:
# 1. Push your code to GitHub
# 2. In Render dashboard, click "New +" → "Blueprint"
# 3. Select this render.yaml file
# =============================================

services:
  # =============================================
  # Backend API Service (Java Spark)
  # =============================================
  - type: web
    name: quickbite-backend
    env: docker
    # Use the Dockerfile in BACKEND/
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    autoDeploy: true
    
    # Environment variables for the backend
    envVars:
      - key: PORT
        value: 8080
      - key: DB_URL
        # This will be set by the database connection below
        fromDatabase:
          name: quickbite-db
          property: mysql_url
      - key: DB_USER
        fromDatabase:
          name: quickbite-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: quickbite-db
          property: password
    
    # Health check - Render will check this endpoint
    healthCheckPath: /api/health

  # =============================================
  # MySQL Database
  # =============================================
  - type: mysql
    name: quickbite-db
    plan: free
    mysqlVersion: "8.0"

  # =============================================
  # Frontend Static Site
  # =============================================
  - type: static
    name: quickbite-frontend
    plan: free
    autoDeploy: true
    buildCommand: # No build needed - using vanilla HTML/CSS/JS
    publishDir: FRONTEND
    # Environment variables for frontend
    envVars:
      - key: API_URL
        value: https://quickbite-backend.onrender.com/api
